name: split_moments
description: "Split Moments - 双人私密日记"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.8
  # 状态管理
  flutter_riverpod: ^2.6.1
  # 图片选择
  image_picker: ^1.1.2
  # 本地存储
  shared_preferences: ^2.3.5
  # 日历
  table_calendar: ^3.1.3
  # 日期格式化
  intl: ^0.19.0
  # 图片缓存
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
