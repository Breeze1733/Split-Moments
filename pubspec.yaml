name: diptych
description: "Diptych - 双人私密日记"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # HTTP 请求
  http: ^1.2.0
  # 状态管理
  flutter_riverpod: ^2.6.1
  # 图片选择
  image_picker: ^1.1.2
  # 本地存储
  shared_preferences: ^2.3.5
  # 日历
  table_calendar: ^3.1.3
  # 日期格式化
  intl: ^0.19.0
  # 图片缓存
  cached_network_image: ^3.4.1
  # 文件路径
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
